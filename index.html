<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-neutral-100 text-neutral-900">
  <!-- Top Bar -->
  <header class="sticky top-0 z-50 bg-neutral-950 text-white">
    <div class="mx-auto w-full max-w-5xl px-4 py-3">
      <div class="text-base font-semibold tracking-tight">Profile</div>
    </div>
  </header>

  <main class="mx-auto w-full max-w-5xl px-4 py-4 pb-12">
    <!-- Mobile: single column. Desktop: two column. -->
    <div class="grid grid-cols-1 gap-4 lg:grid-cols-12">
      <!-- LEFT: Profile + Stats -->
      <section class="lg:col-span-5">
        <div class="rounded-2xl bg-white shadow-sm ring-1 ring-neutral-200">
          <div class="px-4 pt-5 pb-4">
            <div class="flex flex-col items-center text-center">
              <img
                src="/assets/images/profilephoto.png"
                alt="Victor Turner Profile"
                class="h-20 w-20 rounded-full object-cover ring-2 ring-neutral-200 sm:h-24 sm:w-24"
              />
              <h1 class="mt-3 text-lg font-semibold sm:text-xl">Victor Turner</h1>
              <p class="mt-0.5 text-xs text-neutral-600 sm:text-sm">@victorturner82</p>
              <p class="mt-2 text-sm text-neutral-700">Conversion Operator</p>

              <button
                type="button"
                class="mt-3 inline-flex items-center justify-center rounded-full bg-neutral-950 px-7 py-2 text-sm font-semibold text-white transition hover:bg-neutral-900 focus:outline-none focus:ring-2 focus:ring-neutral-900 focus:ring-offset-2"
              >
                Message
              </button>
            </div>
          </div>

          <!-- Stats Grid (values grey/opacity like your screenshot) -->
          <div class="px-4 pb-5">
            <div class="grid grid-cols-2 gap-3 sm:gap-4">
              <div class="rounded-none border border-neutral-300 bg-white p-3 sm:p-4">
                <div class="text-sm font-semibold sm:text-base">In Progress</div>
                <div class="mt-2 text-sm font-medium text-neutral-500/80" id="statInProgress">5</div>
              </div>

              <div class="rounded-none border border-neutral-300 bg-white p-3 sm:p-4">
                <div class="text-sm font-semibold sm:text-base">Queue</div>
                <div class="mt-2 text-sm font-medium text-neutral-500/80" id="statQueue">2</div>
              </div>

              <div class="rounded-none border border-neutral-300 bg-white p-3 sm:p-4">
                <div class="text-sm font-semibold sm:text-base">Completed</div>
                <div class="mt-2 text-sm font-medium text-neutral-500/80" id="statCompleted">47</div>
              </div>

              <div class="rounded-none border border-neutral-300 bg-white p-3 sm:p-4">
                <div class="text-sm font-semibold sm:text-base">Status</div>
                <div class="mt-2 flex items-center gap-2 text-sm font-medium text-neutral-500/80">
                  <span id="statStatus">Active</span>
                  <span class="h-2 w-2 rounded-full bg-emerald-500"></span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- RIGHT: Gig tab + Scrollable gig list (NO STICKY / NO FLOAT) -->
      <section class="lg:col-span-7">
        <div class="rounded-2xl bg-white shadow-sm ring-1 ring-neutral-200">
          <div class="p-4 sm:p-5">
            <div class="text-sm text-neutral-600">Gig tab</div>

            <!-- Tabs: mobile scrollable -->
            <div class="mt-3 -mx-4 overflow-x-auto px-4">
              <div class="flex w-max gap-3 sm:w-full sm:justify-start">
                <button
                  type="button"
                  class="tab-btn whitespace-nowrap rounded-full border border-neutral-200 bg-neutral-950 px-6 py-3 text-sm font-semibold text-white"
                  data-tab="etsy"
                  aria-selected="true"
                >
                  Etsy
                </button>

                <button
                  type="button"
                  class="tab-btn whitespace-nowrap rounded-full border border-neutral-200 bg-white px-6 py-3 text-sm font-semibold text-neutral-900"
                  data-tab="shopify"
                  aria-selected="false"
                >
                  Shopify
                </button>

                <button
                  type="button"
                  class="tab-btn whitespace-nowrap rounded-full border border-neutral-200 bg-white px-6 py-3 text-sm font-semibold text-neutral-900"
                  data-tab="redbubble"
                  aria-selected="false"
                >
                  Redbubble
                </button>
              </div>
            </div>

            <!-- Scroll container: standard height in-flow + internal scroll -->
            <!-- Mobile-friendly: max height relative to viewport, with safe padding -->
            <div
              class="mt-5 overflow-hidden rounded-2xl bg-neutral-50 ring-1 ring-neutral-200"
            >
              <div class="px-4 py-3 text-xs font-medium text-neutral-600">
                Offers (scroll)
              </div>

              <div
                id="gigScroll"
                class="max-h-[55vh] overflow-y-auto px-4 pb-4"
              >
                <div id="gigGrid" class="grid grid-cols-1 gap-4 sm:grid-cols-2"></div>
              </div>
            </div>

            <!-- Optional: small hint for mobile -->
            <div class="mt-3 text-xs text-neutral-500">
              Scroll inside this section to view more offers.
            </div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script>
    const gigs = {
      etsy: [
        { title: "Full Etsy Rewrite", desc: "Optimize listing messaging.", price: "$129", image: "assets/images/gig-etsy-rewrite.jpg", cta: "View Gig" },
        { title: "Etsy Conversion Audit", desc: "Find why traffic doesn’t convert.", price: "$79", image: "assets/images/gig-etsy-audit.jpg", cta: "View Gig" },
        { title: "Etsy Listing Audit", desc: "Identify listing friction points.", price: "$89", image: "assets/images/gig-etsy-audit.jpg", cta: "View Gig" },
        { title: "Etsy Offer Upgrade", desc: "Tighten clarity and confidence.", price: "$149", image: "assets/images/gig-etsy-rewrite.jpg", cta: "View Gig" },
      ],
      shopify: [
        { title: "Shopify PDP Rewrite", desc: "Improve product page clarity.", price: "$179", image: "assets/images/gig-shopify-rewrite.jpg", cta: "View Gig" },
        { title: "Shopify Leak Audit", desc: "Diagnose drop-offs across PDP → cart.", price: "$99", image: "assets/images/gig-shopify-audit.jpg", cta: "View Gig" },
        { title: "Cart Friction Audit", desc: "Reduce abandonment triggers.", price: "$119", image: "assets/images/gig-shopify-audit.jpg", cta: "View Gig" },
        { title: "Offer Structure Upgrade", desc: "Strengthen value framing.", price: "$199", image: "assets/images/gig-shopify-rewrite.jpg", cta: "View Gig" },
      ],
      redbubble: [
        { title: "Redbubble Listing Upgrade", desc: "Improve title/tag alignment.", price: "$99", image: "assets/images/gig-redbubble-rewrite.jpg", cta: "View Gig" },
        { title: "Redbubble Store Audit", desc: "Find storefront + listing gaps.", price: "$59", image: "assets/images/gig-redbubble-audit.jpg", cta: "View Gig" },
        { title: "Tag Alignment Audit", desc: "Fix search mismatch patterns.", price: "$69", image: "assets/images/gig-redbubble-audit.jpg", cta: "View Gig" },
        { title: "Upload System Setup", desc: "Repeatable listing structure.", price: "$249", image: "assets/images/gig-redbubble-rewrite.jpg", cta: "View Gig" },
      ],
    };

    const gigGrid = document.getElementById("gigGrid");
    let activeTab = "etsy";

    function gigCardHTML(g) {
      return `
        <article class="w-full rounded-2xl bg-white shadow-sm ring-1 ring-neutral-200">
          <div class="p-4">
            <div class="w-full overflow-hidden rounded-xl bg-neutral-100 ring-1 ring-neutral-200">
              <img src="${g.image}" alt="${g.title}" class="h-36 w-full object-cover sm:h-40" />
            </div>

            <h3 class="mt-3 text-sm font-semibold sm:text-base">${g.title}</h3>
            <p class="mt-1 text-xs text-neutral-600 sm:text-sm">${g.desc}</p>

            <div class="mt-2 text-base font-semibold sm:text-lg">${g.price}</div>

            <button
              type="button"
              class="mt-3 inline-flex w-full items-center justify-center rounded-xl border border-neutral-200 bg-white px-4 py-2.5 text-sm font-semibold text-neutral-900 transition hover:bg-neutral-50 focus:outline-none focus:ring-2 focus:ring-neutral-900 focus:ring-offset-2"
            >
              ${g.cta}
            </button>
          </div>
        </article>
      `;
    }

    function renderGigs(tab) {
      gigGrid.innerHTML = (gigs[tab] || []).map(gigCardHTML).join("");
      // Reset internal scroll to top on tab change (better UX on mobile)
      const scroller = document.getElementById("gigScroll");
      if (scroller) scroller.scrollTop = 0;
    }

    function updateTabUI(tab) {
      document.querySelectorAll(".tab-btn").forEach((btn) => {
        const isActive = btn.dataset.tab === tab;

        btn.classList.remove("bg-neutral-950", "text-white");
        btn.classList.add("bg-white", "text-neutral-900");

        if (isActive) {
          btn.classList.remove("bg-white", "text-neutral-900");
          btn.classList.add("bg-neutral-950", "text-white");
        }
      });
    }

    function setActiveTab(tab) {
      activeTab = tab;
      renderGigs(tab);
      updateTabUI(tab);
    }

    // Event delegation
    document.addEventListener("click", (e) => {
      const btn = e.target.closest(".tab-btn");
      if (!btn) return;
      setActiveTab(btn.dataset.tab);
    });

    setActiveTab(activeTab);
  </script>
</body>
</html>
