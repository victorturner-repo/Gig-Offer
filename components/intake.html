<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Intake</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-white text-neutral-900 antialiased">

<!-- ===== Intake Preloader ===== -->
<div id="intakeLoader"
  class="fixed inset-0 z-50 hidden items-center justify-center bg-white/90 backdrop-blur-sm">
  <div class="flex flex-col items-center gap-4">
    <div class="h-10 w-10 rounded-full border-2 border-neutral-900 border-t-transparent animate-spin"></div>
    <p id="loaderText" class="text-sm font-medium text-neutral-800 tracking-tight">
      Loading intake
    </p>
  </div>
</div>

<main class="max-w-3xl mx-auto px-4 py-5 space-y-5">

  <section class="space-y-2">
    <p class="text-xs font-medium text-neutral-500">Order intake</p>
    <h1 class="text-2xl font-semibold leading-tight">
      Confirm scope for your Etsy audit
    </h1>
    <p class="text-sm text-neutral-600">
      Submit the details below so I can confirm fit and generate invoice instructions.
    </p>
  </section>

  <!-- Reference -->
  <section class="rounded-xl border border-neutral-200 bg-neutral-50 p-4">
    <div class="flex items-start justify-between gap-3">
      <div class="space-y-1">
        <p class="text-xs font-medium text-neutral-500">Reference</p>
        <p id="refId" class="font-mono text-sm font-semibold text-neutral-900">VT-—</p>
        <p class="text-xs text-neutral-500">Use this reference in messages.</p>
      </div>

      <button id="copyRef" type="button"
        class="text-sm font-medium text-neutral-700 underline decoration-neutral-300 underline-offset-4 hover:text-neutral-900">
        Copy reference
      </button>
    </div>
  </section>

  <!-- Intake Form -->
  <section class="rounded-xl border border-neutral-200 p-4 sm:p-5 space-y-4">
    <form id="intakeForm" class="space-y-4">

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
        <div class="space-y-1">
          <label class="text-xs font-medium text-neutral-700">Full name</label>
          <input name="fullName" required
            class="w-full rounded-lg border border-neutral-300 px-3 py-2 text-sm"
            placeholder="Taylor Reynolds" />
        </div>

        <div class="space-y-1">
          <label class="text-xs font-medium text-neutral-700">Email</label>
          <input name="email" type="email" required
            class="w-full rounded-lg border border-neutral-300 px-3 py-2 text-sm"
            placeholder="taylor@yourshop.com" />
        </div>
      </div>

      <div class="space-y-1">
        <label class="text-xs font-medium text-neutral-700">Etsy listing link</label>
        <input name="listingUrl" type="url" required
          class="w-full rounded-lg border border-neutral-300 px-3 py-2 text-sm"
          placeholder="Paste exact Etsy listing URL" />
      </div>

      <div class="space-y-1">
        <label class="text-xs font-medium text-neutral-700">
          What’s the primary issue?
        </label>
        <textarea name="problem" required rows="4"
          class="w-full rounded-lg border border-neutral-300 px-3 py-2 text-sm"
          placeholder="Example: Buyers drop mid-scroll. Trust + clarity issue."></textarea>
      </div>

      <button id="submitBtn" type="submit"
        class="w-full h-[48px] rounded-lg bg-neutral-900 text-white text-sm font-semibold hover:bg-neutral-800">
        Submit intake
      </button>

    </form>
  </section>

  <!-- Output -->
  <section id="outputWrap"
    class="hidden rounded-xl border border-neutral-200 bg-white p-4 space-y-3">
    <p class="text-sm font-semibold">Generated message</p>
    <pre id="msgBox"
      class="whitespace-pre-wrap text-xs leading-5 bg-neutral-50 border border-neutral-200 rounded-lg p-3"></pre>
  </section>

</main>

<script>
(function () {

  const $ = (id) => document.getElementById(id);
  const intakeLoader = $("intakeLoader");
  const loaderText = $("loaderText");
  const form = $("intakeForm");
  const submitBtn = $("submitBtn");
  const outputWrap = $("outputWrap");
  const msgBox = $("msgBox");

  function buildRef() {
    const d = new Date();
    return `VT-${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}-${Math.random().toString(36).slice(2,6).toUpperCase()}`;
  }

  const ref = buildRef();
  $("refId").textContent = ref;

  $("copyRef").addEventListener("click", async () => {
    await navigator.clipboard.writeText(ref);
    $("copyRef").textContent = "Copied";
    setTimeout(() => $("copyRef").textContent = "Copy reference", 1000);
  });

  function showLoader() {
    intakeLoader.classList.remove("hidden");
    intakeLoader.classList.add("flex");

    const states = [
      "Loading intake",
      "Processing",
      "Status: Generating message"
    ];

    let i = 0;
    loaderText.textContent = states[i];

    return setInterval(() => {
      i = Math.min(i + 1, states.length - 1);
      loaderText.textContent = states[i];
    }, 900);
  }

  function hideLoader(interval) {
    clearInterval(interval);
    intakeLoader.classList.add("hidden");
    intakeLoader.classList.remove("flex");
  }

  let preInterval = null;

  submitBtn.addEventListener("click", () => {
    if (form.checkValidity()) {
      preInterval = showLoader();
    }
  });

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const interval = preInterval ?? showLoader();

    // force paint (mobile safe)
    await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));

    await new Promise(r => setTimeout(r, 2000));

    const fd = new FormData(form);

    const message = `
Reference: ${ref}

Client: ${fd.get("fullName")} (${fd.get("email")})
Listing: ${fd.get("listingUrl")}

Primary issue:
${fd.get("problem")}

Next step requested: confirm fit + send invoice instructions.
`.trim();

    msgBox.textContent = message;
    outputWrap.classList.remove("hidden");
    outputWrap.scrollIntoView({ behavior: "smooth" });

    hideLoader(interval);
    preInterval = null;
  });

})();
</script>

</body>
</html>
